      <stop offset="0.52" stop-color="#EEF2FF"/>
      <stop offset="1" stop-color="#E0F2FE"/>
    </linearGradient>
    <linearGradient id="accent" x1="190" y1="72" x2="1300" y2="346" gradientUnits="userSpaceOnUse">
