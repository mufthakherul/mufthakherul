  <text x="92" y="91" fill="#F9FAFB" font-size="18" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="600" letter-spacing="0.4">CYBERSECURITY • AI • AUTOMATION</text>

  <text x="70" y="182" fill="#0F172A" font-size="56" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="800" letter-spacing="1.1">MD. MUFTHAKHERUL ISLAM MIRAZ</text>

